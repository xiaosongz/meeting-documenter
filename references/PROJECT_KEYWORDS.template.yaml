# Project keyword mappings for auto-detection — TEMPLATE
#
# Format: ProjectFolderName: [keywords...]
#
# Usage: When analyzing a meeting transcript, the skill matches keywords
# (case-insensitive) to suggest the most relevant project folder.
#
# Priority: More specific keywords (e.g., a unique project codename) should
# come before generic ones (e.g., "survey"). The skill confirms with the user
# in all cases, so ordering only affects the suggested default.
#
# ─── REPLACE THE EXAMPLES BELOW WITH YOUR OWN PROJECTS ──────────────────────

REPLACE_ME_PROJECT_1:
  - replace-me-keyword-1a
  - replace-me-keyword-1b
  - replace-me-keyword-1c
  # Add unique keywords your team uses for this project

REPLACE_ME_PROJECT_2:
  - replace-me-keyword-2a
  - replace-me-keyword-2b
  - replace-me-keyword-2c

REPLACE_ME_PROJECT_3:
  - replace-me-keyword-3a
  - replace-me-keyword-3b
  - replace-me-keyword-3c

# Generic team/meeting keywords (lower priority, prefix with _)
_REPLACE_ME_TEAM_1:
